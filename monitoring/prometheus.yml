global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rate-limiter-app1"
    static_configs:
      - targets: ["app1:8000"]
    metrics_path: /metrics

  - job_name: "rate-limiter-app2"
    static_configs:
      - targets: ["app2:8000"]
    metrics_path: /metrics
