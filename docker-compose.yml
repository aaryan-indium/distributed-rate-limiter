services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - rate-limiter-network

  app1:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile
    container_name: app1
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      - redis
    networks:
      - rate-limiter-network

  app2:
    build:
      context: .
      dockerfile: Dockerfile/Dockerfile
    container_name: app2
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8000"
    depends_on:
      - redis
    networks:
      - rate-limiter-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - rate-limiter-network

networks:
  rate-limiter-network:
    driver: bridge
